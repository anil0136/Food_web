services:
  - type: web
    name: foodluxe
    runtime: python
    buildCommand: bash build.sh
    startCommand: gunicorn btm3.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: foodluxe-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: PYTHON_VERSION
        value: 3.12.7

databases:
  - name: foodluxe-db
    databaseName: foodluxe
    user: foodluxe

{% extends 'base.html' %}
{% block content %}

<style>
    /* Payment Page Styling */
    .container.mt-5 {
        max-width: 1000px;
        margin: 60px auto !important;
        padding: 0 15px;
    }

    /* Success Alert */
    .alert.alert-success {
        background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%) !important;
        border: none !important;
        border-radius: 12px !important;
        color: white !important;
        padding: 18px 24px !important;
        margin-bottom: 30px !important;
        box-shadow: 0 8px 24px rgba(17, 153, 142, 0.2) !important;
        font-weight: 600 !important;
    }

    .alert.alert-success i {
        font-size: 20px;
    }

    .alert.alert-success .btn-close {
        filter: brightness(0) invert(1);
    }

    /* Card Container */
    .row.justify-content-center {
        display: flex;
        justify-content: center;
    }

    .card.shadow {
        background: white;
        border: none;
        border-radius: 16px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.1);
        overflow: hidden;
        border-top: 5px solid #667eea;
    }

    .card-body {
        padding: 40px;
    }

    h3.text-center.mb-4 {
        font-size: 28px;
        font-weight: 700;
        color: #0f172a;
        margin-bottom: 30px !important;
        position: relative;
        padding-bottom: 15px;
    }

    h3.text-center.mb-4::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 80px;
        height: 4px;
        background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
        border-radius: 2px;
    }

    /* Total Amount Display */
    h5 {
        font-size: 18px;
        font-weight: 700;
        color: #333;
        padding: 20px;
        background: linear-gradient(135deg, #f8f9ff 0%, #f3f7ff 100%);
        border-left: 4px solid #667eea;
        border-radius: 8px;
        margin-bottom: 25px;
    }

    /* Payment Method Options */
    .form-check {
        padding: 15px 18px;
        margin-bottom: 12px;
        border-radius: 10px;
        background: #f8f9ff;
        border: 2px solid transparent;
        transition: all 0.3s ease;
    }

    .form-check:hover {
        background: #f0f4ff;
        border-color: #667eea;
    }

    .form-check input[type="radio"] {
        width: 20px;
        height: 20px;
        margin-top: 2px;
        cursor: pointer;
        accent-color: #667eea;
    }

    .form-check input[type="radio"]:checked {
        accent-color: #667eea;
    }

    .form-check-input {
        border: 2px solid #d1d5db;
        border-radius: 50%;
    }

    .form-check-input:checked {
        background-color: #667eea !important;
        border-color: #667eea !important;
        box-shadow: none;
    }

    .form-check-input:focus {
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .form-check-label {
        font-size: 16px;
        font-weight: 600;
        color: #333;
        margin-left: 10px;
        cursor: pointer;
        margin-bottom: 0;
        display: flex;
        align-items: center;
    }

    /* Payment Method Icons */
    .form-check input[value="cod"] ~ .form-check-label::before {
        content: '💵 ';
        margin-right: 8px;
    }

    .form-check input[value="upi"] ~ .form-check-label::before {
        content: '📱 ';
        margin-right: 8px;
    }

    .form-check input[value="card"] ~ .form-check-label::before {
        content: '💳 ';
        margin-right: 8px;
    }

    /* Pay Button Container */
    .text-center.mt-4 {
        margin-top: 30px !important;
        padding-top: 20px;
        border-top: 2px solid #e9ecef;
    }

    /* Pay Button */
    .btn.btn-success.btn-lg {
        background: linear-gradient(90deg, #22c55e 0%, #16a34a 100%) !important;
        border: none !important;
        padding: 16px 50px !important;
        font-size: 18px !important;
        font-weight: 700 !important;
        border-radius: 10px !important;
        box-shadow: 0 8px 24px rgba(34, 197, 94, 0.3) !important;
        transition: all 0.3s ease !important;
        color: white !important;
        width: 100%;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .btn.btn-success.btn-lg:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 32px rgba(34, 197, 94, 0.4) !important;
    }

    .btn.btn-success.btn-lg:active {
        transform: translateY(-1px);
    }

    .btn.btn-success.btn-lg:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }

    /* Responsive */
    @media (max-width: 768px) {
        .container.mt-5 {
            margin: 40px auto !important;
        }

        .card-body {
            padding: 25px;
        }

        h3.text-center.mb-4 {
            font-size: 22px;
        }

        h5 {
            font-size: 16px;
            padding: 16px;
        }

        .form-check {
            padding: 12px 15px;
        }

        .form-check-label {
            font-size: 14px;
        }

        .btn.btn-success.btn-lg {
            padding: 14px 20px !important;
            font-size: 16px !important;
        }
    }
</style>

<div class="container mt-5">

    {% if success %}
    <div class="alert alert-success alert-dismissible fade show text-center">
        <i class="bi bi-check-circle-fill me-2"></i>
        {{ success }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endif %}

    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body">

                    <h3 class="text-center mb-4">Select Payment Method</h3>

                    <form method="POST">
                        {% csrf_token %}

                        <h5>Total Amount: ₹{{ grand_total }}</h5>

                        <div class="form-check mt-3">
                            <input class="form-check-input" type="radio" name="payment_method" value="cod" checked>
                            <label class="form-check-label">Cash on Delivery</label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="payment_method" value="upi">
                            <label class="form-check-label">UPI</label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="payment_method" value="card">
                            <label class="form-check-label">Card</label>
                        </div>

                        <div class="text-center mt-4">
                            <button class="btn btn-success btn-lg">Pay Now</button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}

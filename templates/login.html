{% extends 'base.html' %}

{% load crispy_forms_tags %}

{% block content %}

<style>
    .login-hero {
        display:flex; align-items:center; justify-content:center;
        padding: 40px 0;
    }
    .login-card {
        width: 100%; max-width: 460px; background: #fff; border-radius: 14px; padding: 30px; box-shadow: 0 12px 40px rgba(2,6,23,0.08);
        border-top: 4px solid #0d6efd;
    }
    .login-title { text-align:center; font-size:22px; font-weight:700; margin-bottom:8px; }
    .login-sub { text-align:center; color:#6b7280; margin-bottom:18px; }
    .form-control-custom { width:100%; padding:10px 12px; border-radius:8px; border:1px solid #e6e9ef; margin-bottom:12px; }
    .login-actions { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-top:12px; }
    .btn-login { background: linear-gradient(90deg,#0d6efd 0%, #0069d9 100%); color:#fff; border:none; padding:10px 18px; border-radius:10px; font-weight:700; }
    .btn-forgot { color:#6b7280; font-size:14px; }
    @media (max-width:480px){ .login-card{ padding:20px; } }
</style>

<div class="container login-hero">
    <div class="login-card">
        <div class="login-title">Welcome Back</div>
        <div class="login-sub">Sign in to continue to your account</div>

        <form method="POST">
            {% csrf_token %}
            <label class="form-label">Username</label>
            <input class="form-control-custom" type="text" name="username" placeholder="Enter username" required>

            <label class="form-label">Password</label>
            <input class="form-control-custom" type="password" name="password" placeholder="Enter password" required>

            <div class="login-actions">
                <a href="{% url 'forgot_password' %}" class="btn-forgot">Forgot password?</a>
                <input type="submit" class="btn-login" value="LOGIN">
            </div>
        </form>
    </div>
</div>
{% endblock %}
